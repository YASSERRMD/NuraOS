# BusyBox mdev configuration for NuraOS.
#
# mdev is invoked for each kernel uevent; it creates/removes device nodes and
# triggers hotplug scripts. devtmpfs creates the initial nodes; mdev sets
# permissions and handles hotplug actions via the @ column.
#
# Format: <regex>  <uid>:<gid>  <permissions>  [@|$|*<script>]
#   @<script> -- run on device ADD
#   $<script> -- run on device REMOVE
#   *<script> -- run on ADD and REMOVE
#
# Fields are separated by whitespace. Lines beginning with # are comments.

# ----- Console and virtual terminals -----
console         0:0 0600
tty             0:0 0666
tty[0-9]*       0:0 0620
ttyS[0-9]*      0:5 0660

# ----- Memory and null devices -----
mem             0:0 0640
null            0:0 0666
zero            0:0 0666
full            0:0 0666

# ----- Kernel ring buffer -----
kmsg            0:0 0660

# ----- Entropy sources -----
random          0:0 0444
urandom         0:0 0444
hwrng           0:0 0440

# ----- virtio block devices -----
# vda is the boot disk (initramfs); vdb and beyond are data disks.
# The hotplug-block script attempts to mount /data when a known data device appears.
vda             0:0 0640
vdb             0:0 0640 @/etc/mdev/hotplug-block
vd[c-z]         0:0 0640 @/etc/mdev/hotplug-block

# ----- SCSI block devices (if CONFIG_SCSI=y in future builds) -----
sd[a-z]         0:0 0640 @/etc/mdev/hotplug-block

# ----- NVMe block devices -----
nvme[0-9]*n[0-9]* 0:0 0640 @/etc/mdev/hotplug-block

# ----- IDE/legacy block devices -----
hd[a-z]         0:0 0640 @/etc/mdev/hotplug-block

# ----- Partitions -----
vda[0-9]*       0:0 0640
vdb[0-9]*       0:0 0640
sd[a-z][0-9]*   0:0 0640

# ----- PTY -----
ptmx            0:0 0666
pts/[0-9]*      0:5 0620

# ----- Watchdog -----
watchdog[0-9]*  0:0 0640

# ----- Misc (catch-all) -----
.*              0:0 0660
