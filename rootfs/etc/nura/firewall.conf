# NuraOS firewall configuration.
# Applied at boot by /sbin/nura-firewall-apply after network bringup.
# Reload at runtime: run nura-firewall-apply as root.

# TCP port for the gateway inbound rule. Set to match GATEWAY_PORT.
GATEWAY_PORT=8080

# Space-separated list of outbound IP addresses or CIDR ranges to allow.
# Populated with provider endpoint IPs that the agent needs to reach.
# Leave empty for offline operation; DNS, DHCP, and NTP are always allowed.
# Example: OUTBOUND_IPS="203.0.113.10 198.51.100.0/24"
OUTBOUND_IPS=""

# NTP server IP to allow outbound (optional; matches NURA_NTP_SERVER).
# Leave empty if using offline mode with no NTP.
NTP_IP=""
