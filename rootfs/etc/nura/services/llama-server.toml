name        = "llama-server"
description = "llama.cpp inference server"
exec        = "/sbin/llama-server-wrapper"
args        = ["--host", "127.0.0.1", "--port", "8081", "--log-disable"]
type        = "longrun"
user        = "llama"
enabled     = true

[restart]
policy            = "on-failure"
max_restarts      = 5
backoff_initial   = 1
backoff_max       = 30
crash_loop_limit  = 5
crash_loop_window = 60
crash_loop_backoff = 120

[resources]
# llama-server gets a lower CPU weight than the gateway (400) and agent (200)
# so that interactive control-plane operations preempt background inference.
# NURA_LLAMA_MEMORY_MAX overrides this at runtime (set via model-activate.sh).
cpu_weight = 100
memory_max = "4G"

[readiness]
type    = "http"
url     = "http://127.0.0.1:8081/health"
timeout = 120

[namespaces]
mount   = true
ipc     = true
uts     = true

[seccomp]
profile = "/etc/nura/seccomp/llama-server.toml"
mode    = "enforce"

[landlock]
profile = "/etc/nura/landlock/llama-server.toml"

[capabilities]
bounding_drop = ["all"]
