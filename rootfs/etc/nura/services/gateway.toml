name        = "gateway"
description = "NuraOS HTTP gateway (socket-activated)"
exec        = "/sbin/gateway"
type        = "longrun"
user        = "nura-gw"
after       = ["nura-agent"]
requires    = ["nura-agent"]
enabled     = true

[restart]
policy            = "on-failure"
max_restarts      = 5
backoff_initial   = 1
backoff_max       = 30
crash_loop_limit  = 5
crash_loop_window = 60
crash_loop_backoff = 120

[resources]
# Gateway gets the highest CPU weight so interactive user requests are never
# starved by ongoing inference work in the llama-server cgroup.
cpu_weight = 400
memory_max = "128M"

[readiness]
type    = "http"
url     = "http://127.0.0.1:8080/healthz"
timeout = 30

[socket_activation]
enabled      = true
network      = "tcp"
address      = "0.0.0.0:8080"
idle_timeout = 300

[namespaces]
ipc = true

[seccomp]
profile = "/etc/nura/seccomp/gateway.toml"
mode    = "enforce"

[landlock]
profile = "/etc/nura/landlock/gateway.toml"

[capabilities]
bounding_drop = ["all"]
