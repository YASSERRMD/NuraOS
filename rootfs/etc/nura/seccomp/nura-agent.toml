# Seccomp allowlist for the nura-agent service (Rust AI agent).
# Includes syscalls needed for the su/sh launch chain plus the service itself.
# Run with mode = "log" first to refine this list via the audit log.
mode = "enforce"

syscalls = [
  # launch chain: BusyBox su + sh -> service exec
  "execve", "execveat",
  "setresuid", "setresgid", "setuid", "setgid",
  "setfsuid", "setfsgid", "setgroups",
  "capget", "capset",
  "getuid", "getgid", "geteuid", "getegid",
  "getresuid", "getresgid",
  "setpgid", "getpgid", "setsid",

  # process management
  "fork", "clone", "clone3", "vfork",
  "wait4", "waitid",
  "exit", "exit_group",
  "kill", "tgkill", "tkill",
  "getpid", "getppid", "gettid",

  # memory
  "brk", "mmap", "munmap", "mprotect", "mremap",
  "madvise", "mlock", "munlock",

  # file I/O
  "read", "write", "pread64", "pwrite64",
  "readv", "writev", "preadv", "pwritev",
  "open", "openat", "openat2", "creat",
  "close", "close_range",
  "stat", "fstat", "lstat", "statx", "newfstatat",
  "access", "faccessat", "faccessat2",
  "lseek", "dup", "dup2", "dup3",
  "getdents", "getdents64",
  "readlink", "readlinkat",
  "fcntl", "ioctl",
  "mkdir", "mkdirat", "rmdir",
  "unlink", "unlinkat",
  "rename", "renameat", "renameat2",
  "chdir", "fchdir", "getcwd",
  "chmod", "fchmod", "fchmodat", "fchmodat2",
  "chown", "fchown", "lchown", "fchownat",
  "truncate", "ftruncate",
  "fsync", "fdatasync", "sync", "syncfs",
  "fallocate",

  # network (agent listens on UNIX socket for gateway connections)
  "socket", "bind", "connect", "listen",
  "accept", "accept4",
  "sendto", "recvfrom", "sendmsg", "recvmsg",
  "setsockopt", "getsockopt",
  "getsockname", "getpeername",
  "shutdown",
  "socketpair",
  "pipe", "pipe2",

  # signals
  "rt_sigaction", "rt_sigprocmask", "rt_sigreturn",
  "rt_sigpending", "rt_sigsuspend",
  "sigaltstack",

  # time
  "clock_gettime", "clock_getres", "clock_nanosleep",
  "gettimeofday", "nanosleep",
  "timerfd_create", "timerfd_settime", "timerfd_gettime",

  # polling / event
  "epoll_create", "epoll_create1", "epoll_ctl", "epoll_wait", "epoll_pwait", "epoll_pwait2",
  "select", "pselect6", "poll", "ppoll",
  "eventfd", "eventfd2",
  "inotify_init", "inotify_init1", "inotify_add_watch", "inotify_rm_watch",

  # system info / misc
  "uname", "sysinfo", "getrlimit", "setrlimit", "prlimit64",
  "prctl", "arch_prctl",
  "set_tid_address", "set_robust_list", "get_robust_list",
  "sched_yield", "sched_getaffinity", "sched_setaffinity",
  "futex", "futex_waitv",
  "getrandom",
  "memfd_create",
  "statfs", "fstatfs",
]
