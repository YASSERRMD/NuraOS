# Seccomp allowlist for the gateway service (Go HTTP reverse proxy).
# The gateway is socket-activated: the manager hands it a pre-opened TCP fd.
# Includes syscalls for the su/sh launch chain + gateway operations.
mode = "enforce"

syscalls = [
  # launch chain: BusyBox su + sh -> service exec
  "execve", "execveat",
  "setresuid", "setresgid", "setuid", "setgid",
  "setfsuid", "setfsgid", "setgroups",
  "capget", "capset",
  "getuid", "getgid", "geteuid", "getegid",
  "getresuid", "getresgid",
  "setpgid", "getpgid", "setsid",

  # process management
  "clone", "clone3",
  "exit", "exit_group",
  "kill", "tgkill",
  "getpid", "getppid", "gettid",

  # memory
  "brk", "mmap", "munmap", "mprotect", "mremap",
  "madvise",

  # file I/O (config, TLS certs)
  "read", "write", "pread64",
  "open", "openat", "openat2",
  "close", "close_range",
  "stat", "fstat", "lstat", "statx", "newfstatat",
  "access", "faccessat", "faccessat2",
  "lseek", "dup", "dup2", "dup3",
  "getdents64",
  "readlink", "readlinkat",
  "fcntl", "ioctl",
  "mkdir", "mkdirat",
  "unlink", "unlinkat",
  "rename", "renameat2",
  "chdir", "getcwd",
  "chmod", "fchmod",
  "chown", "fchown", "fchownat",

  # network (accept clients, connect to agent socket)
  "socket", "bind", "connect", "listen",
  "accept", "accept4",
  "sendto", "recvfrom", "sendmsg", "recvmsg",
  "setsockopt", "getsockopt",
  "getsockname", "getpeername",
  "shutdown",
  "socketpair",
  "pipe", "pipe2",

  # signals
  "rt_sigaction", "rt_sigprocmask", "rt_sigreturn",
  "rt_sigpending", "rt_sigsuspend",
  "sigaltstack",

  # time
  "clock_gettime", "clock_getres", "clock_nanosleep",
  "gettimeofday", "nanosleep",
  "timerfd_create", "timerfd_settime", "timerfd_gettime",

  # polling / event
  "epoll_create", "epoll_create1", "epoll_ctl", "epoll_wait", "epoll_pwait", "epoll_pwait2",
  "select", "pselect6", "poll", "ppoll",
  "eventfd", "eventfd2",

  # misc
  "uname", "getrlimit", "prlimit64",
  "prctl", "arch_prctl",
  "set_tid_address", "set_robust_list", "get_robust_list",
  "sched_yield", "sched_getaffinity",
  "futex", "futex_waitv",
  "getrandom",
  "memfd_create",
  "statfs", "fstatfs",
]
