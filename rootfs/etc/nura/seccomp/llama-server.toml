# Seccomp allowlist for llama-server (C++ inference engine).
# llama.cpp uses BLAS/CBLAS for matrix ops; includes mmap for model weight loading.
# Includes syscalls for the su/sh launch chain.
mode = "enforce"

syscalls = [
  # launch chain: BusyBox su + sh -> service exec
  "execve", "execveat",
  "setresuid", "setresgid", "setuid", "setgid",
  "setfsuid", "setfsgid", "setgroups",
  "capget", "capset",
  "getuid", "getgid", "geteuid", "getegid",
  "getresuid", "getresgid",
  "setpgid", "getpgid", "setsid",

  # process management (llama uses threads via clone)
  "clone", "clone3",
  "exit", "exit_group",
  "kill", "tgkill",
  "getpid", "getppid", "gettid",
  "wait4",

  # memory (model weights loaded via mmap)
  "brk", "mmap", "munmap", "mprotect", "mremap",
  "madvise", "mincore", "msync",
  "mlock", "munlock", "mlockall", "munlockall",

  # file I/O (model files, config)
  "read", "write", "pread64", "pwrite64",
  "readv", "writev", "preadv", "pwritev",
  "open", "openat", "openat2",
  "close", "close_range",
  "stat", "fstat", "lstat", "statx", "newfstatat",
  "access", "faccessat", "faccessat2",
  "lseek", "dup", "dup2", "dup3",
  "getdents64",
  "readlink", "readlinkat",
  "fcntl", "ioctl",
  "getcwd", "chdir",

  # network (serves HTTP on 127.0.0.1:8081)
  "socket", "bind", "connect", "listen",
  "accept", "accept4",
  "sendto", "recvfrom", "sendmsg", "recvmsg",
  "setsockopt", "getsockopt",
  "getsockname", "getpeername",
  "shutdown",
  "pipe", "pipe2",

  # signals
  "rt_sigaction", "rt_sigprocmask", "rt_sigreturn",
  "rt_sigpending", "rt_sigsuspend",
  "sigaltstack",

  # time
  "clock_gettime", "clock_getres", "clock_nanosleep",
  "gettimeofday", "nanosleep",

  # polling
  "epoll_create", "epoll_create1", "epoll_ctl", "epoll_wait", "epoll_pwait",
  "select", "pselect6", "poll", "ppoll",
  "eventfd", "eventfd2",

  # threading (llama uses pthreads)
  "futex", "futex_waitv",
  "set_tid_address", "set_robust_list", "get_robust_list",
  "sched_yield", "sched_getaffinity", "sched_setaffinity",

  # misc
  "uname", "getrlimit", "setrlimit", "prlimit64",
  "prctl", "arch_prctl",
  "getrandom",
  "statfs", "fstatfs",
]
