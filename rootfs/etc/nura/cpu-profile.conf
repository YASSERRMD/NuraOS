# NuraOS CPU frequency profile.
#
# profile=performance  -- pin all CPUs at max frequency; lowest inference
#                         latency at the cost of higher power draw. Recommended
#                         for dedicated inference appliances.
#
# profile=balanced     -- ondemand governor; half of physical cores used for
#                         inference threads, remainder available for I/O.
#                         Lower average wattage, slightly higher first-token
#                         latency during frequency ramp-up.
#
# Applied at boot by /sbin/nura-cpu-apply. Changing this file takes effect
# on next reboot (or run nura-cpu-apply manually as root).
profile=performance
